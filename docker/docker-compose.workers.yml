services:

  worker-it-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: worker-it-1
    networks: [carbonlb]
    environment:
      - CONFIG_PATH=/config/config.json
      - NODE_ID=worker-it-1
      - NODE_REGION=IT
      - LISTEN_ADDR=:8081
      - NODE_ADDRESS=worker-it-1:8081
      - REGISTRY_URL=http://registry:9000
      - STATE_URL=http://stateserver:9001
      - CARBONLB_WORKER_BASE_POWER_WATTS=60
    volumes:
      - ../config:/config:ro
    depends_on:
      registry:
        condition: service_healthy
      stateserver:
        condition: service_healthy
    restart: unless-stopped

