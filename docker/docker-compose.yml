networks:
  carbonlb:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}

services:

  stateserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.stateserver
    container_name: stateserver
    networks: [carbonlb]
    ports:
      - "9001:9001"
    environment:
      - STATE_ADDR=:9001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    container_name: registry
    networks: [carbonlb]
    ports:
      - "9000:9000"
    environment:
      - CONFIG_PATH=/config/config.json
      - CARBONLB_REGISTRY_ADDRESS=:9000
      - CARBONLB_REGISTRY_NODE_TTL=30s
    volumes:
      - ../config:/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  loadbalancer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lb
    container_name: loadbalancer
    networks: [carbonlb]
    ports:
      - "8080:8080"
      - "2112:2112"
    environment:
      - CONFIG_PATH=/config/config.json
      - REGISTRY_URL=http://registry:9000
      - CARBONLB_LOADBALANCER_CARBON_WEIGHT=${CARBON_WEIGHT:-0.5}
      - CARBONLB_LOADBALANCER_ENERGY_WEIGHT=${ENERGY_WEIGHT:-0.3}
      - CARBONLB_LOADBALANCER_LOAD_WEIGHT=${LOAD_WEIGHT:-0.2}
      - CARBONLB_CARBON_PROVIDER=mock
      - CARBONLB_CARBON_DEFAULT_INTENSITY=300.0
    volumes:
      - ../config:/config:ro
    depends_on:
      registry:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    networks: [carbonlb]
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    networks: [carbonlb]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    restart: unless-stopped
